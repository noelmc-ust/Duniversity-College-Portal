apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: uni-route
  namespace: noel-ns
spec:
  parentRefs:
    - name: noel-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: uni-service
          namespace: uni-ns
          port: 83
