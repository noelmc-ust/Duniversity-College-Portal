name: CI-CD Pipeline

on:
  push:
    branches:
      - develop
  workflow_dispatch: # This adds the manual "Run workflow" button

jobs:
  # JOB 1: CI (Runs automatically on push to develop)
  ci:
    name: Validate Code (Develop)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    
      - name: Docker Build Test
        run: docker build -t validation-image:${{ github.sha }} .

  # JOB 2: CD (Runs ONLY when you click the button)
  cd:
    name: Build & Push Docker Image
    needs: ci # CD won't run unless CI passes
    if: github.event_name == 'workflow_dispatch' # Ensures this job only runs via the button
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/app 
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest